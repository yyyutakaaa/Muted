name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Validate tag and derive version
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tags must look like v1.2.3."
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build, test, and package
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Version $env:VERSION

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' `
            "artifacts/Muted-Setup-$env:VERSION.exe" `
            "artifacts/Muted-Setup-$env:VERSION.exe.sha256" `
            "artifacts/Muted-win-x64.zip" `
            --verify-tag `
            --generate-notes `
            --title "Muted $env:VERSION"
